name: Publish package to the Maven Central Repository
on:
  release:
    types: [created]
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java for publishing to Maven Central Repository
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven # Runs the Maven package goal
        run: mvn clean package source:jar

      - name: Upload JAR artifact # Uploads the generated JAR file as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-db-user-federation-jar
          path: target/*.jar # The default location for the generated JAR file